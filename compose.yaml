services:
  quic_client:
    profiles: ['client']
    init: true
    ipc: host
    stop_grace_period: 30s
    user: "${HOST_UID}:${HOST_GID}"
    image: ${DOCKERHUB_USERNAME}/turbo-quic-client:${IMAGE_TAG:-latest}
    depends_on:
      client_python_monitor:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG}
      RUST_BACKTRACE: ${RUST_BACKTRACE}
    volumes:
      - type: bind
        source: ${QUIC_DOCKER_CLIENT_CONFIG_PATH}
        target: /app/quic_config.yaml
        read_only: true
      - type: bind
        source: ${EXPERIMENT_OUTPUT_DIR}
        target: /app/experiment2-out
      - zmq_client:/app/zmq-out
      - health_signals:/health
    networks:
      - quic_net

  quic_server:
    profiles: ['server']
    init: true
    ipc: host
    stop_grace_period: 30s
    user: "${HOST_UID}:${HOST_GID}"
    image: ${DOCKERHUB_USERNAME}/turbo-quic-server:${IMAGE_TAG:-latest}
    environment:
      RUST_LOG: ${RUST_LOG}
      RUST_BACKTRACE: ${RUST_BACKTRACE}
    volumes:
      - type: bind
        source: ${QUIC_DOCKER_SERVER_CONFIG_PATH}
        target: /app/quic_config.yaml
        read_only: true
      - type: bind
        source: ${EXPERIMENT_OUTPUT_DIR}
        target: /app/experiment2-out
      - zmq_server:/app/zmq-out
    ports:
      - "${QUIC_SERVER_PORT}:${QUIC_SERVER_PORT}/udp"

  client_python_main:
    profiles: ['client']
    init: true
    ipc: host
    stop_grace_period: 30s
    user: "${HOST_UID}:${HOST_GID}"
    image: ${DOCKERHUB_USERNAME}/turbo-python-client:${IMAGE_TAG:-latest}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - health_signals:/health
      - type: bind
        source: ${PYTHON_DOCKER_CLIENT_CONFIG_PATH}
        target: /app/python_config.yaml
        read_only: true
      - type: bind
        source: ${DOCKER_LOG_CONFIG_PATH}
        target: /app/logging_config.yaml
        read_only: true
      - type: bind
        source: ${EXPERIMENT_OUTPUT_DIR}
        target: /app/experiment2-out
      - zmq_client:/app/zmq-out
      - type: bind
        source: ${MODEL_FULL_EVAL_DIR}
        target: /app/full-eval
        read_only: true
      - type: bind
        source: ${EXPERIMENT_MODEL_INFO_PATH}
        target: /app/experiment_model_info.csv
        read_only: true
      - type: bind
        source: ${MOCK_EFFDET_INPUT_PATH}
        target: /app/mock_webcam_image.jpg
        read_only: true
    command: >
      bash -c 'cd src/python && exec python client_main.py -c /app/python_config.yaml -s ${QUIC_CLIENT_ADDR} ${MOCK_CAMERA:+--mock-camera}'
    healthcheck:
      test: ["CMD", "test", "-f", "/health/client_main_ready"]
      interval: 2s
      timeout: 3s
      start_period: 30s
      retries: 30

  server_python_main:
    profiles: ['server']
    init: true
    ipc: host
    stop_grace_period: 30s
    user: "${HOST_UID}:${HOST_GID}"
    image: ${DOCKERHUB_USERNAME}/turbo-python-server:${IMAGE_TAG:-latest}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - type: bind
        source: ${PYTHON_DOCKER_SERVER_CONFIG_PATH}
        target: /app/python_config.yaml
        read_only: true
      - type: bind
        source: ${DOCKER_LOG_CONFIG_PATH}
        target: /app/logging_config.yaml
        read_only: true
      - type: bind
        source: ${EXPERIMENT_OUTPUT_DIR}
        target: /app/experiment2-out
      - zmq_server:/app/zmq-out
      - type: bind
        source: ${EFFDET_MODELS_DIR}
        target: /app/av-models
        read_only: true
      - type: bind
        source: ${EXPERIMENT_MODEL_INFO_PATH}
        target: /app/experiment_model_info.csv
        read_only: true
      - type: bind
        source: ${MOCK_EFFDET_OUTPUT_PATH}
        target: /app/example_effdet_d4_output.npy
        read_only: true
    command: >
      bash -c 'cd src/python && exec python server_main.py -c /app/python_config.yaml ${MOCK_INFERENCE:+--mock-inference}'

  client_python_monitor:
    profiles: ['client']
    init: true
    ipc: host
    stop_grace_period: 30s
    user: "${HOST_UID}:${HOST_GID}"
    image: ${DOCKERHUB_USERNAME}/turbo-python-monitor:${IMAGE_TAG:-latest}
    depends_on:
      client_python_main:
        condition: service_healthy
    volumes:
      - health_signals:/health
      - type: bind
        source: ${PYTHON_DOCKER_CLIENT_CONFIG_PATH}
        target: /app/python_config.yaml
        read_only: true
      - type: bind
        source: ${EXPERIMENT_OUTPUT_DIR}
        target: /app/experiment2-out
      - zmq_client:/app/zmq-out
    ports:
      - "${DASHBOARD_PORT}:5000"
    healthcheck:
      test: ["CMD", "test", "-f", "/health/monitor_ready"]
      interval: 2s
      timeout: 3s
      start_period: 30s
      retries: 30

networks:
  quic_net:
    ipam:
      config:
        - subnet: 10.64.89.0/24
          gateway: 10.64.89.1

volumes:
  health_signals:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  zmq_client:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  zmq_server:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
